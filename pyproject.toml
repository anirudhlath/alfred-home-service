[project]
name = "home-service"
version = "0.1.0"
description = "Home Assistant wrapper microservice"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.27",
    "fastapi>=0.115",
    "uvicorn>=0.34",
]

[project.optional-dependencies]
alfred = [
    "alfred-sdk>=0.1.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
include = ["app*", "alfred_ext*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
